- name: Get the status of all xnames
  request:
    url: "{capmc_base_url}/capmc/v1/get_xname_status"
    json: {"source": "hsm"}
    method: POST
    verify: !bool "{verify}"
  response:
    status_code: 200
    verify_response_with:
      function: tavern.testutils.helpers:validate_pykwalify
      extra_kwargs:
        schema:
          type: map
          required: True
          mapping:
            "e":
              type: int
              required: True
              enum:
                - 0
            "err_msg":
              required: True
              type: str
              enum:
                - ""
            "on":
              type: seq
              matching: all
              required: False
              sequence:
                - type: int
                  unique: True
            "off":
              type: seq
              matching: all
              required: False
              sequence:
                - type: int
                  unique: True
            "halt":
              type: seq
              matching: all
              required: False
              sequence:
                - type: int
                  unique: True
            "standby":
              type: seq
              matching: all
              required: False
              sequence:
                - type: int
                  unique: True
            "ready":
              type: seq
              matching: all
              required: False
              sequence:
                - type: int
                  unique: True
            "disabled":
              type: seq
              matching: all
              required: False
              sequence:
                - type: int
                  unique: True
            "flags":
              type: map
              required: False
              mapping:
                key:
                  type: seq
                  matching: all
                  required: False
                  sequence:
                    - type: int
                      unique: True
      function: tavern.testutils.helpers:validate_content
      extra_kwargs:
        comparisons:

          - jmespath: "length(keys(@))"
            operator: "gt"
            expected: 2